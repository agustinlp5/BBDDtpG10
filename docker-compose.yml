services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ibd_postgres_db
    ports:
      - 5433:5432
    volumes:
      - postgres_volume:/var/lib/postgresql/data
      - ./inputData/:/data/
    environment:
      - POSTGRES_DB=ibd_postgres
      - POSTGRES_USER=ibd_postgres
      - POSTGRES_PASSWORD=ibd_secretpassword
volumes:
    postgres_volume:
        external: false